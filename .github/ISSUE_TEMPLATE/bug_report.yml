name: Bug report
description: Create a report to help us improve
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you did...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, Provider (Twilio/Deepgram/etc.)
      placeholder: Node 20.9.0, macOS, Deepgram
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Please provide clear steps to reproduce the issue.
      placeholder: |
        1. createAgent with...
        2. agent.start...
        3. call into...
    validations:
      required: true
