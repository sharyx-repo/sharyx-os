name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'sharyx-os/package-lock.json'
    
    - name: Install dependencies
      run: cd sharyx-os && npm install
    
    - name: Build
      run: cd sharyx-os && npm run build
    
    - name: Run tests
      run: cd sharyx-os && npm test
